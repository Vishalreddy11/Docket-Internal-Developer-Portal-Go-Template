# SeaweedFS — S3-API-compatible object store (Apache 2.0).
# Service name "s3" is used so the code stays vendor-neutral (S3_ENDPOINT
# points at s3:9000 — swap SeaweedFS for AWS S3 / Ceph RGW / etc. without
# touching any Go code).
# -s3.port=9000 keeps the standard S3-API port.
#
# NodePort:
#   30900 → S3 API (for the Go app + any S3-compatible client)
#
# NOTE: this POC runs SeaweedFS without -s3.config; requests are accepted
# without validating the AWS v4 signature. For prod, mount an s3.json
# identity file and add -s3.config=/etc/seaweedfs/s3.json.
apiVersion: v1
kind: Service
metadata:
  name: s3
  namespace: docket
spec:
  type: NodePort
  selector:
    app: s3
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      nodePort: 30900
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: s3
  namespace: docket
spec:
  serviceName: s3
  replicas: 1
  selector:
    matchLabels:
      app: s3
  template:
    metadata:
      labels:
        app: s3
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.22
          args: ["server", "-s3", "-s3.port=9000", "-dir=/data"]
          ports:
            - containerPort: 9000
          readinessProbe:
            tcpSocket: { port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
