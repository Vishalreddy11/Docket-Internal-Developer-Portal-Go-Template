apiVersion: v1
kind: ConfigMap
metadata:
  name: docket-config
  namespace: docket
data:
  DOCKET_PORT: "8080"
  LOG_LEVEL: "info"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "docket"
  POSTGRES_DB: "docket"
  POSTGRES_SSLMODE: "disable"
  NATS_URL: "nats://nats:4222"
  NATS_STREAM: "DOCKET_EVENTS"
  NATS_SUBJECT_PREFIX: "docket.files"
  REDIS_ADDR: "redis:6379"
  REDIS_DB: "0"
  S3_ENDPOINT: "s3:9000"
  S3_BUCKET: "docket"
  S3_USE_SSL: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
  OTEL_SERVICE_NAME: "docket"
---
apiVersion: v1
kind: Secret
metadata:
  name: docket-secrets
  namespace: docket
type: Opaque
stringData:
  DOCKET_API_KEY: "dev-secret-change-me"
  POSTGRES_PASSWORD: "docket"
  S3_ACCESS_KEY: "docketaccesskey"
  S3_SECRET_KEY: "docketsecretkey"
  REDIS_PASSWORD: ""
