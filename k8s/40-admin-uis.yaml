# ============================================================================
# Browser-based admin UIs for the three backends that don't ship their own.
#
# All three are stateless (P3X keeps a small settings volume). Each is
# exposed on a NodePort so a developer can visit http://<any-node-ip>:<port>.
#
#   Service          NodePort   Login
#   ─────────────────────────────────────────────────────────
#   Adminer          30081      Postgres creds: user/pass/DB = docket
#   NUI              30083      add connection nats://nats:4222 once
#   P3X Redis UI     30084      add connection redis:6379 once
# ============================================================================

# ---- Adminer (Postgres) ----------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: docket
spec:
  type: NodePort
  selector:
    app: adminer
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:5
          ports:
            - containerPort: 8080
          env:
            - name: ADMINER_DEFAULT_SERVER
              value: postgres
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m",  memory: "64Mi"  }
            limits:   { cpu: "100m", memory: "128Mi" }

# ---- NUI (NATS admin console) ----------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: nui
  namespace: docket
spec:
  type: NodePort
  selector:
    app: nui
  ports:
    - port: 31311
      targetPort: 31311
      nodePort: 30083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nui
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nui
  template:
    metadata:
      labels:
        app: nui
    spec:
      containers:
        - name: nui
          image: ghcr.io/nats-nui/nui:0.9
          ports:
            - containerPort: 31311
          readinessProbe:
            tcpSocket: { port: 31311 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m",  memory: "64Mi"  }
            limits:   { cpu: "100m", memory: "128Mi" }

# ---- P3X Redis UI (Valkey) -------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: p3x-redis-ui
  namespace: docket
spec:
  type: NodePort
  selector:
    app: p3x-redis-ui
  ports:
    - port: 7843
      targetPort: 7843
      nodePort: 30084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: p3x-redis-ui
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: p3x-redis-ui
  template:
    metadata:
      labels:
        app: p3x-redis-ui
    spec:
      containers:
        - name: p3x-redis-ui
          image: patrikx3/p3x-redis-ui:2024.10.128
          ports:
            - containerPort: 7843
          readinessProbe:
            tcpSocket: { port: 7843 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m",  memory: "64Mi"  }
            limits:   { cpu: "100m", memory: "128Mi" }
