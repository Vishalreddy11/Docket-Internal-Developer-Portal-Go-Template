# ============================================================================
# Browser-based admin UIs for the four backends that don't ship their own.
#
# All four are stateless — no PVCs. Each is exposed on a NodePort so a
# developer can visit http://<any-node-ip>:<port> and log in.
#
#   Service          NodePort   Login
#   ─────────────────────────────────────────────────────────
#   Adminer          30081      Postgres creds: user/pass/DB = docket
#   Mongo Express    30082      admin / admin  (basic-auth)
#   NUI              30083      add connection nats://nats:4222 once
#   Redis Commander  30084      none
# ============================================================================

# ---- Adminer (Postgres) ----------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: docket
spec:
  type: NodePort
  selector:
    app: adminer
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:latest
          ports:
            - containerPort: 8080
          env:
            - name: ADMINER_DEFAULT_SERVER
              value: postgres
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m",  memory: "64Mi"  }
            limits:   { cpu: "100m", memory: "128Mi" }

# ---- Mongo Express ---------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
  namespace: docket
spec:
  type: NodePort
  selector:
    app: mongo-express
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: mongo-express
          image: mongo-express:latest
          ports:
            - containerPort: 8081
          env:
            - { name: ME_CONFIG_MONGODB_SERVER, value: "mongo" }
            - { name: ME_CONFIG_MONGODB_PORT,   value: "27017" }
            - { name: ME_CONFIG_BASICAUTH_USERNAME, value: "admin" }
            - { name: ME_CONFIG_BASICAUTH_PASSWORD, value: "admin" }
          readinessProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "20m",  memory: "128Mi" }
            limits:   { cpu: "100m", memory: "256Mi" }

# ---- NUI (NATS admin console) ----------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: nui
  namespace: docket
spec:
  type: NodePort
  selector:
    app: nui
  ports:
    - port: 31311
      targetPort: 31311
      nodePort: 30083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nui
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nui
  template:
    metadata:
      labels:
        app: nui
    spec:
      containers:
        - name: nui
          image: ghcr.io/nats-nui/nui:latest
          ports:
            - containerPort: 31311
          readinessProbe:
            tcpSocket: { port: 31311 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m",  memory: "64Mi"  }
            limits:   { cpu: "100m", memory: "128Mi" }

# ---- Redis Commander -------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: redis-commander
  namespace: docket
spec:
  type: NodePort
  selector:
    app: redis-commander
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-commander
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-commander
  template:
    metadata:
      labels:
        app: redis-commander
    spec:
      containers:
        - name: redis-commander
          image: rediscommander/redis-commander:latest
          ports:
            - containerPort: 8081
          env:
            - name: REDIS_HOSTS
              value: local:redis:6379
          readinessProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m",  memory: "64Mi"  }
            limits:   { cpu: "100m", memory: "128Mi" }
