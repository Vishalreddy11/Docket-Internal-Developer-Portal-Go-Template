# ============================================================================
# Per-namespace resource guardrails for a POC deployment.
#
# Total budget for one Docket namespace:
#   CPU     : 2 cores requested, 4 cores burst
#   Memory  : 3 Gi requested, 5 Gi burst
#   Storage : 3 Gi across at most 5 PVCs
#   Pods    : 15 (we run 11; 4 spare for one-off jobs / debug pods)
#
# The LimitRange sets sane defaults for any container that forgets to declare
# `resources:` — safer than uncapped consumption when developers fork this
# template and add their own containers.
# ============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: docket-poc-quota
  namespace: docket
spec:
  hard:
    requests.cpu:            "2"
    requests.memory:         "3Gi"
    limits.cpu:              "4"
    limits.memory:           "5Gi"
    requests.storage:        "3Gi"
    persistentvolumeclaims:  "5"
    count/pods:              "15"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: docket-container-defaults
  namespace: docket
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "2Gi"
