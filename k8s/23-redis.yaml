# Redis — view-counter cache. Ephemeral (no PVC) for POC — cache doesn't need
# to survive restart. Add a PVC here if you want counters to persist.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: docket
spec:
  type: NodePort
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: 30379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "50m",  memory: "64Mi"  }
            limits:   { cpu: "200m", memory: "128Mi" }
