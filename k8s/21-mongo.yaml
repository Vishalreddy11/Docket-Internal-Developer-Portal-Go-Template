# MongoDB — file metadata store.
# PVC: 500Mi (Mongo preallocates aggressively, needs a bit of room).
# NodePort 30017 for developer laptops → local Go binary can connect to
# mongodb://<node-ip>:30017.
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: docket
spec:
  type: NodePort
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
      nodePort: 30017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: docket
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "1Gi" }
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 500Mi
