# Jaeger all-in-one — OTel trace collector + UI.
# In-memory trace storage (fine for POC; traces vanish on pod restart).
# For durable trace storage, back Jaeger with Elasticsearch / Cassandra.
#
# Two NodePorts:
#   30686 → Jaeger web UI (browser)
#   30318 → OTLP HTTP receiver (for apps running outside the cluster that want
#           to send spans here; the Docket pod uses cluster-internal DNS)
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: docket
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      nodePort: 30686
    - name: otlp-http
      port: 4318
      targetPort: 4318
      nodePort: 30318
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: docket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          env:
            - { name: COLLECTOR_OTLP_ENABLED, value: "true" }
          ports:
            - containerPort: 16686
            - containerPort: 4318
            - containerPort: 4317
          readinessProbe:
            httpGet: { path: /, port: 16686 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "50m",  memory: "128Mi" }
            limits:   { cpu: "300m", memory: "512Mi" }
