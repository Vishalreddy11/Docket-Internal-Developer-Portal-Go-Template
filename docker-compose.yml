services:
  docket:
    build: .
    container_name: docket
    depends_on:
      - postgres
      - nats
      - redis
      - s3
      - jaeger
    environment:
      DOCKET_PORT: "8080"
      DOCKET_API_KEY: "dev-secret-change-me"
      LOG_LEVEL: "info"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: docket
      POSTGRES_PASSWORD: docket
      POSTGRES_DB: docket
      POSTGRES_SSLMODE: disable
      NATS_URL: nats://nats:4222
      NATS_STREAM: DOCKET_EVENTS
      NATS_SUBJECT_PREFIX: docket.files
      REDIS_ADDR: redis:6379
      REDIS_DB: "0"
      S3_ENDPOINT: s3:9000
      S3_ACCESS_KEY: docketaccesskey
      S3_SECRET_KEY: docketsecretkey
      S3_BUCKET: docket
      S3_USE_SSL: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: docket
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    container_name: docket-postgres
    environment:
      POSTGRES_USER: docket
      POSTGRES_PASSWORD: docket
      POSTGRES_DB: docket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nats:
    image: nats:2.14-alpine
    container_name: docket-nats
    # -js enables JetStream (persistent streams, replay, at-least-once)
    # -m 8222 exposes the monitoring HTTP endpoint (used by NUI)
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"    # NATS client protocol (for docker containers AND host)
      - "8222:8222"    # HTTP monitoring — used by NUI
    volumes:
      - natsdata:/data

  # Valkey — Redis-protocol-compatible fork under the Linux Foundation.
  # BSD 3-Clause. Service name kept as "redis" so REDIS_ADDR stays unchanged.
  redis:
    image: valkey/valkey:9.1-alpine
    container_name: docket-redis
    ports:
      - "6379:6379"

  # SeaweedFS — S3-API-compatible object store (Apache 2.0).
  # Service name "s3" keeps the code vendor-neutral: swap SeaweedFS for AWS S3,
  # Ceph RGW, or another S3-compatible endpoint just by changing S3_ENDPOINT.
  # For prod: add -s3.config=/etc/seaweedfs/s3.json to enforce identities;
  # without it SeaweedFS accepts requests without validating the AWS v4 signature.
  s3:
    image: chrislusf/seaweedfs:4.22
    container_name: docket-s3
    command: server -s3 -s3.port=9000 -dir=/data
    ports:
      - "9000:9000"   # S3 API
    volumes:
      - s3data:/data

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: docket-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

  # ===== Admin UIs (browse data in each backend) =====

  adminer:
    image: adminer:5
    container_name: docket-adminer
    depends_on: [postgres]
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8081:8080"

  nui:
    image: ghcr.io/nats-nui/nui:0.9
    container_name: docket-nui
    depends_on: [nats]
    ports:
      - "8083:31311"   # NUI listens internally on :31311; we map it to 8083
    volumes:
      - nuidata:/db

  # P3X Redis UI — MIT-licensed, actively maintained. Works with Valkey.
  p3x-redis-ui:
    image: patrikx3/p3x-redis-ui:2024.10.128
    container_name: docket-p3x-redis-ui
    depends_on: [redis]
    ports:
      - "8084:7843"
    volumes:
      - p3xdata:/settings

volumes:
  pgdata:
  natsdata:
  s3data:
  nuidata:
  p3xdata:
